<!DOCTYPE html>
<html>
<head>
    <title>Secreto</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            color: #333;
            overflow: hidden;
        }

        #final {
            display: none;
            font-size: 35px;
            color: white;
        }

        .pista {
            margin-top: 20px;
            font-size: 18px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }

        input, button {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #ff6b81;
            color: white;
            cursor: pointer;
        }

        .heart {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

<div id="inicio">
    <h2>ikapxaejl ek dwuhj ek 3430</h2>

    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="check()">Entrar</button>

    <p id="mensaje"></p>

    <div class="pista">
        💌 Pista:<br><br>
        “4:52 am”
    </div>
</div>

<div id="final">
    💖 Tú también me gustas y mucho muuuchoooo 💖
</div>

<!-- 🎵 AUDIO -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function check() {
    var password = document.getElementById("pass").value;

    if(password === "veinticinco de abril de 2025") {
        
        document.getElementById("inicio").style.display = "none";
        document.getElementById("final").style.display = "block";

        // 🔊 Forzar reproducción
        let audio = document.getElementById("musica");
        audio.volume = 1;
        audio.play().catch(() => {
            console.log("El navegador bloqueó el audio");
        });

        startHearts();

    } else {
        document.getElementById("mensaje").innerText = "Contraseña incorrecta 😢";
    }
}

function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖 💕 💞";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 150);
}
</script>

</body>
</html>
