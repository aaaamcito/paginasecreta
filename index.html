<!DOCTYPE html>
<html>
<head>
    <title>Secreto</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            color: #333;
            overflow: hidden;
        }

        h2 {
            font-size: 30px;
        }

        .pista {
            margin-top: 20px;
            font-size: 18px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #ff6b81;
            color: white;
            cursor: pointer;
        }

        .heart {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

<h2>Ingresa la contraseña 😏</h2>

<input type="password" id="pass" placeholder="Contraseña">
<button onclick="check()">Entrar</button>

<p id="mensaje"></p>

<div class="pista">
💌 Pista:<br><br>
“La fecha que lo empezó todo… escríbela con palabras 😏”
</div>

<!-- 🎵 AUDIO -->
<audio id="musica" loop>
  <source src="Axolotl(MP3_160K).mp3" type="audio/mp3">
</audio>

<script>
function check() {
    var password = document.getElementById("pass").value;

    if(password === "veinticinco de abril de 2025") {
        document.body.innerHTML = "<h1 style='color:white;'>💖 Tú también me gustas 💖</h1>";
        
        document.getElementById("musica").play();
        startHearts();
    } else {
        document.getElementById("mensaje").innerText = "Contraseña incorrecta 😢";
    }
}

function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 200);
}
</script>

</body>
</html>
