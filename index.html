<!DOCTYPE html>
<html>
<head>
    <title>Secreto</title>
    <style>
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            color: #333;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        #final {
            display: none;
            font-size: 35px;
            color: white;
            opacity: 0;
            transition: opacity 2s;
        }

        .show {
            opacity: 1 !important;
        }

        .pista {
            margin-top: 20px;
            font-size: 18px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }

        input, button {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #ff6b81;
            color: white;
            cursor: pointer;
        }

        .heart {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* 💓 LATIDO */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ✨ EFECTO HOVER */
        .tefy-link {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: #ff6b81;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            animation: pulse 1.5s infinite;
            transition: all 0.3s ease;
        }

        .tefy-link:hover {
            transform: scale(1.3);
            text-shadow: 0 0 10px #ff6b81;
        }
    </style>
</head>

<body>

<div id="inicio">
    <h2>ikapxaejl ek dwuhj ek 3430</h2>

    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="check()">Entrar</button>

    <p id="mensaje"></p>

    <div class="pista">
        💌 Pista:<br><br>
        “4:52 am”
        <br><br>
        “Tal vez necesitas un código… 😏”
    </div>
</div>

<div id="final">
    💖 Tú también me gustas y mucho muuuchoooo 💖
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function check() {
    var password = document.getElementById("pass").value;

    if(password === "veintidos de marzo de 2025") {
        
        document.getElementById("inicio").style.display = "none";
        let final = document.getElementById("final");
        final.style.display = "block";

        setTimeout(() => {
            final.classList.add("show");
        }, 100);

        let audio = document.getElementById("musica");
        audio.volume = 1;
        audio.play().catch(() => {});

        startHearts();

    } else {
        document.getElementById("mensaje").innerText = "Contraseña incorrecta 😢";
    }
}

function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 120);
}
</script>

<a href="codigo.html" class="tefy-link">
Tefy 💕
</a>

</body>
</html>
